server {
    listen 80;
    server_name openclaw.你的域名.com;

    # 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name openclaw.你的域名.com;

    # SSL 证书路径（使用 Cloudflare Origin CA 或 Let's Encrypt）
    ssl_certificate     /etc/ssl/certs/openclaw.pem;
    ssl_certificate_key /etc/ssl/private/openclaw-key.pem;

    # 如果使用 Cloudflare Tunnel，不需要 SSL 配置
    # Cloudflare Tunnel 自己处理 TLS

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（OpenClaw 需要）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
