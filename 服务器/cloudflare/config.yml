# Cloudflare Tunnel 配置
# 部署路径: ~/.cloudflared/config.yml
# 使用方法：
#   1. 登录: cloudflared tunnel login
#   2. 创建隧道: cloudflared tunnel create openclaw
#   3. 配置 DNS: cloudflared tunnel route dns openclaw <你的域名>
#   4. 启动: cloudflared tunnel run openclaw

tunnel: openclaw
credentials-file: /root/.cloudflared/openclaw.json

ingress:
  # OpenClaw Web UI
  - hostname: openclaw.你的域名.com
    service: http://localhost:8080
  # 所有其他请求
  - service: http_status:404
